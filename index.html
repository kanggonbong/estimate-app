```html
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>우성고 쿠팡 견적서 생성기</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
    }

    .input-clean{
      border:1px solid #dbe3ef;
      background:white;
      transition:all .18s ease;
    }

    .input-clean:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,.12);
      outline:none;
    }

    .action-btn{
      transition:all .18s ease;
    }

    .action-btn:hover{
      transform:translateY(-1px);
    }

    @media print{
      .no-print{
        display:none!important;
      }

      body{
        background:white;
        padding:0;
      }
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

  <div class="bg-white rounded-3xl shadow-xl p-8">

    <div class="mb-8">

      <h1 class="text-4xl font-black text-slate-900">
        🛒 쿠팡 견적서 생성기
      </h1>

      <p class="text-slate-500 mt-3">
        쿠팡 장바구니 체크 상품 자동 불러오기
      </p>

      <div id="status-box"
           class="hidden mt-4 rounded-2xl px-4 py-3 text-sm">
      </div>

    </div>

    <div class="overflow-x-auto rounded-2xl border border-slate-200">

      <table class="w-full text-sm bg-white">

        <thead class="bg-slate-100">

          <tr>
            <th class="p-4 w-16">선택</th>
            <th class="p-4 text-left">상품명</th>
            <th class="p-4 w-24">수량</th>
            <th class="p-4 w-40 text-right">단가</th>
            <th class="p-4 w-24">삭제</th>
          </tr>

        </thead>

        <tbody id="parsed-list"></tbody>

      </table>

    </div>

    <div class="mt-8 grid grid-cols-1 md:grid-cols-4 gap-4">

      <input
        type="text"
        id="new-item-name"
        placeholder="상품명"
        class="input-clean h-12 px-4 rounded-2xl"
      >

      <input
        type="number"
        id="new-item-qty"
        value="1"
        min="1"
        class="input-clean h-12 px-4 rounded-2xl"
      >

      <input
        type="number"
        id="new-item-price"
        value="0"
        min="0"
        class="input-clean h-12 px-4 rounded-2xl"
      >

      <button
        onclick="addItem()"
        class="action-btn bg-slate-900 text-white rounded-2xl font-black"
      >
        상품 추가
      </button>

    </div>

    <div class="mt-10 border-t pt-8">

      <div class="flex justify-between items-center mb-4">

        <h2 class="text-2xl font-black">
          견적서
        </h2>

        <button
          onclick="window.print()"
          class="no-print action-btn bg-blue-600 text-white px-6 py-3 rounded-2xl font-black"
        >
          인쇄
        </button>

      </div>

      <table class="w-full border-collapse border border-black text-sm">

        <thead>

          <tr class="bg-slate-100">
            <th class="border border-black p-3">
              상품명
            </th>

            <th class="border border-black p-3 w-24">
              수량
            </th>

            <th class="border border-black p-3 w-40">
              금액
            </th>
          </tr>

        </thead>

        <tbody id="final-list"></tbody>

        <tfoot>

          <tr>
            <td colspan="2"
                class="border border-black p-3 text-right font-black">
              총합
            </td>

            <td id="res-total"
                class="border border-black p-3 text-right font-black">
              0
            </td>
          </tr>

        </tfoot>

      </table>

    </div>

  </div>

</div>

<script>

const APP_ORIGIN=window.location.origin;

let items=[];

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatNumber(num){
  return new Intl.NumberFormat('ko-KR').format(num);
}

function showStatus(message,type='ok'){

  const box=document.getElementById('status-box');

  box.classList.remove('hidden');

  box.className='mt-4 rounded-2xl px-4 py-3 text-sm';

  if(type==='ok'){

    box.classList.add(
      'bg-blue-50',
      'text-blue-700'
    );

  }else{

    box.classList.add(
      'bg-red-50',
      'text-red-700'
    );
  }

  box.textContent=message;
}

function renderSelectionTable(){

  const list=document.getElementById('parsed-list');

  list.innerHTML='';

  if(!items.length){

    list.innerHTML=`
      <tr>
        <td colspan="5"
            class="text-center py-16 text-slate-400">
          상품이 없습니다.
        </td>
      </tr>
    `;

    updatePreview();

    return;
  }

  items.forEach((item,index)=>{

    const tr=document.createElement('tr');

    tr.className='border-t';

    tr.innerHTML=`

      <td class="p-4 text-center">

        <input
          type="checkbox"
          ${item.checked?'checked':''}
          onchange="updateItemChecked(${index},this.checked)"
        >

      </td>

      <td class="p-4">

        <div class="font-bold text-slate-800 whitespace-pre-line">
          ${escapeHtml(item.name)}
        </div>

      </td>

      <td class="p-4 text-center">

        <input
          type="number"
          min="1"
          value="${item.qty}"
          onchange="updateItemQty(${index},this.value)"
          class="input-clean w-20 h-10 rounded-xl px-2 text-center"
        >

      </td>

      <td class="p-4 text-right">

        <input
          type="number"
          min="0"
          value="${item.price}"
          onchange="updateItemPrice(${index},this.value)"
          class="input-clean w-28 h-10 rounded-xl px-2 text-right"
        >

      </td>

      <td class="p-4 text-center">

        <button
          onclick="removeItem(${index})"
          class="action-btn bg-red-50 text-red-700 px-3 py-2 rounded-xl font-bold"
        >
          삭제
        </button>

      </td>
    `;

    list.appendChild(tr);
  });

  updatePreview();
}

function updateItemChecked(index,val){

  items[index].checked=val;

  updatePreview();
}

function updateItemQty(index,val){

  items[index].qty=
    Math.max(1,parseInt(val)||1);

  updatePreview();
}

function updateItemPrice(index,val){

  items[index].price=
    Math.max(0,parseInt(val)||0);

  updatePreview();
}

function removeItem(index){

  items.splice(index,1);

  renderSelectionTable();
}

function addItem(){

  const name=document
    .getElementById('new-item-name')
    .value
    .trim();

  const qty=Math.max(
    1,
    parseInt(
      document.getElementById('new-item-qty').value
    )||1
  );

  const price=Math.max(
    0,
    parseInt(
      document.getElementById('new-item-price').value
    )||0
  );

  if(!name){

    showStatus(
      '상품명을 입력하세요',
      'error'
    );

    return;
  }

  items.push({
    name,
    qty,
    price,
    checked:true
  });

  renderSelectionTable();

  showStatus('상품 추가 완료');
}

function updatePreview(){

  const finalList=
    document.getElementById('final-list');

  finalList.innerHTML='';

  let total=0;

  const checkedItems=
    items.filter(v=>v.checked);

  if(!checkedItems.length){

    finalList.innerHTML=`
      <tr>
        <td colspan="3"
            class="text-center py-16 text-slate-400 border border-black">
          선택된 상품이 없습니다.
        </td>
      </tr>
    `;

    document.getElementById('res-total')
      .innerText='0';

    return;
  }

  checkedItems.forEach(item=>{

    const subtotal=
      item.price*item.qty;

    total+=subtotal;

    const tr=document.createElement('tr');

    tr.innerHTML=`

      <td class="border border-black p-3 whitespace-pre-line">
        ${escapeHtml(item.name)}
      </td>

      <td class="border border-black p-3 text-center">
        ${item.qty}
      </td>

      <td class="border border-black p-3 text-right">
        ${formatNumber(subtotal)}
      </td>
    `;

    finalList.appendChild(tr);
  });

  document.getElementById('res-total')
    .innerText=formatNumber(total);
}

window.addEventListener('message',(event)=>{

  if(!event.data)return;

  if(event.data.type==='PING'){

    if(window.opener){

      window.opener.postMessage(
        {type:'QUOTE_APP_READY'},
        event.origin
      );
    }

    return;
  }

  if(event.data.type==='COUPANG_CART_ITEMS'){

    const payload=event.data.payload;

    if(!Array.isArray(payload)){
      return;
    }

    items=payload.map(item=>({

      name:String(item.name||'상품명 없음'),

      qty:Math.max(
        1,
        Number(item.qty||1)
      ),

      price:Math.max(
        0,
        Number(item.price||0)
      ),

      checked:item.checked!==false

    }));

    renderSelectionTable();

    showStatus(
      `${items.length}개 상품 불러오기 완료`
    );
  }

});

window.onload=()=>{

  renderSelectionTable();

  if(window.opener){

    try{

      const referrerOrigin=
        document.referrer
          ? new URL(document.referrer).origin
          : '';

      if(referrerOrigin){

        window.opener.postMessage(
          {type:'QUOTE_APP_READY'},
          referrerOrigin
        );
      }

    }catch(e){}
  }
};

</script>

</body>
</html>
```
