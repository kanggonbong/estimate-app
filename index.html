<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠팡 체크상품 견적서 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Arial, sans-serif; }

    @media print {
      .no-print { display: none !important; }
      body { padding: 0; background: white; }
      .print-area {
        display: block !important;
        border: none !important;
        box-shadow: none !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      th, td { border: 1px solid #000 !important; word-break: break-word; }
      .print-title { display: block !important; }
    }

    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
    th { background-color: #f8fafc; text-align: center; font-weight: bold; font-size: 13px; }
    .quote-head { background-color: #f8fafc; }
    .quote-total { background-color: #eef2f7; font-weight: bold; }
    .print-title {
      display: none;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .soft-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto">
    <div class="no-print mb-8 text-center">
      <header class="mb-8">
        <h1 class="text-4xl font-extrabold text-slate-900 flex items-center justify-center gap-3">
          <span class="text-blue-600">🛒</span> 쿠팡 견적서 생성기
        </h1>
        <p class="text-slate-500 mt-4 text-lg">체크한 상품을 확인하고 견적서를 깔끔하게 정리하세요.</p>
        <div id="status-box" class="mt-5 hidden rounded-2xl px-4 py-3 text-sm"></div>
      </header>

      <div id="selection-area" class="soft-card p-6 md:p-8 text-left">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-5 mb-5 border-b border-slate-200">
          <div>
            <h2 class="text-xl font-bold text-slate-900">가져온 체크 상품 확인</h2>
            <p class="text-sm text-slate-500 mt-1">상품명, 수량, 단가를 확인하고 필요하면 삭제하거나 직접 추가한 뒤 견적서를 미리보세요.</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button onclick="markAll(true)" class="action-btn px-4 py-2 rounded-xl bg-blue-50 text-blue-700 font-bold hover:bg-blue-100 transition-all">전체 체크</button>
            <button onclick="markAll(false)" class="action-btn px-4 py-2 rounded-xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 transition-all">전체 해제</button>
          </div>
        </div>

        <div class="overflow-y-auto max-h-[420px] border border-slate-200 rounded-2xl mb-5 bg-slate-50/70">
          <table class="w-full text-sm bg-white">
            <thead class="sticky top-0 bg-slate-800 text-white z-10">
              <tr>
                <th class="w-16">선택</th>
                <th>상품명</th>
                <th class="w-24 text-center">수량</th>
                <th class="w-36 text-right">단가</th>
                <th class="w-24 text-center">삭제</th>
              </tr>
            </thead>
            <tbody id="parsed-list"></tbody>
          </table>
        </div>

        <div class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-4 mb-5">
          <div class="flex flex-col md:flex-row md:items-end gap-3">
            <div class="flex-1">
              <label class="block text-xs font-bold text-slate-500 mb-2">상품명 추가</label>
              <input type="text" id="new-item-name" placeholder="예: A4 복사용지 80g" class="w-full h-11 px-3 border border-slate-200 rounded-xl outline-none bg-white focus:border-blue-400">
            </div>
            <div class="w-full md:w-28">
              <label class="block text-xs font-bold text-slate-500 mb-2">수량</label>
              <input type="number" id="new-item-qty" min="1" value="1" class="w-full h-11 px-3 border border-slate-200 rounded-xl outline-none bg-white focus:border-blue-400">
            </div>
            <div class="w-full md:w-40">
              <label class="block text-xs font-bold text-slate-500 mb-2">단가</label>
              <input type="number" id="new-item-price" min="0" value="0" class="w-full h-11 px-3 border border-slate-200 rounded-xl outline-none bg-white focus:border-blue-400">
            </div>
            <div class="w-full md:w-auto">
              <button onclick="addItem()" class="action-btn w-full md:w-auto h-11 px-5 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800 transition-all">
                상품 추가
              </button>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-5 rounded-2xl bg-blue-50 border border-blue-100">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-2">배송비</label>
            <input type="number" id="input-shipping" value="0" oninput="updatePreview()" class="w-full h-11 px-3 border border-slate-200 rounded-xl outline-none bg-white font-bold focus:border-blue-400">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-2">할인금액</label>
            <input type="number" id="input-discount" value="0" oninput="updatePreview()" class="w-full h-11 px-3 border border-slate-200 rounded-xl outline-none bg-white text-red-600 font-bold focus:border-blue-400">
          </div>
          <div class="flex items-end">
            <button onclick="showPreview()" class="action-btn w-full h-11 rounded-xl bg-blue-600 text-white font-black hover:bg-blue-700 transition-all shadow-lg">
              견적서 미리보기 ↓
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="print-area" class="max-w-4xl mx-auto bg-white p-5 md:p-10 shadow-xl border border-slate-200 rounded-[28px] print-area relative mb-24 hidden">
      <div class="print-title">견적 명세서</div>

      <div class="mb-8 flex justify-between items-end gap-4 border-b-2 border-slate-900 pb-5">
        <div>
          <h3 class="text-3xl font-black text-slate-900">견적 상세 내역</h3>
          <p class="text-xs text-slate-400 mt-2 uppercase tracking-[0.25em]">Estimated Quotation for School</p>
        </div>
        <div class="text-right text-sm text-slate-700">
          <p class="font-bold">발행일: <span id="current-date"></span></p>
        </div>
      </div>

      <div class="rounded-2xl overflow-hidden border-2 border-slate-900">
        <table class="w-full text-[13px]">
          <thead>
            <tr class="quote-head">
              <th style="width: 55%;" class="border-black">상품명</th>
              <th style="width: 10%;" class="border-black">수량</th>
              <th style="width: 25%;" class="border-black">거래액<br>(VAT포함 원화)</th>
              <th style="width: 10%;" class="border-black">비고</th>
            </tr>
          </thead>
          <tbody id="final-list">
            <tr><td colspan="4" class="py-20 text-center text-slate-300">체크 상품을 불러오면 여기에 견적서가 생성됩니다.</td></tr>
          </tbody>
          <tfoot class="border-t-2 border-black">
            <tr>
              <td colspan="2" class="text-center font-bold quote-head">총 거래액 합계</td>
              <td id="res-gross" class="text-right font-bold px-4">0</td>
              <td></td>
            </tr>
            <tr>
              <td colspan="2" class="text-center font-bold quote-head">배송비 합계</td>
              <td id="res-shipping" class="text-right px-4">0</td>
              <td></td>
            </tr>
            <tr>
              <td colspan="2" class="text-center font-bold quote-head">할인금액</td>
              <td id="res-discount" class="text-right px-4 text-red-600">0</td>
              <td></td>
            </tr>
            <tr class="quote-total">
              <td colspan="2" class="text-center font-bold">실제 총 결제 금액</td>
              <td id="res-net" class="text-right px-4 text-lg">0</td>
              <td class="text-center text-[10px]">결제예정</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <button onclick="window.print()" class="no-print action-btn fixed bottom-8 right-8 bg-blue-600 text-white w-24 h-24 rounded-full shadow-2xl hover:scale-110 transition-all flex flex-col items-center justify-center z-50">
        <span class="text-3xl">🖨️</span>
        <span class="text-xs font-bold mt-1">인쇄/저장</span>
      </button>
    </div>
  </div>

  <script>
    const APP_ORIGIN = window.location.origin;
    const TRUSTED_ORIGINS = new Set([
      'https://www.coupang.com',
      APP_ORIGIN
    ]);

    let items = [];
    let previewVisible = false;

    function formatNumber(num) {
      return new Intl.NumberFormat('ko-KR').format(num);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showStatus(message, type) {
      const box = document.getElementById('status-box');
      box.classList.remove('hidden');
      box.className = 'mt-5 rounded-2xl px-4 py-3 text-sm border';
      if (type === 'ok') box.classList.add('bg-blue-50', 'text-blue-800', 'border-blue-200');
      else if (type === 'warn') box.classList.add('bg-amber-50', 'text-amber-800', 'border-amber-200');
      else box.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
      box.textContent = message;
    }

    function hideStatus() {
      document.getElementById('status-box').classList.add('hidden');
    }

    function renderSelectionTable() {
      const list = document.getElementById('parsed-list');
      list.innerHTML = '';

      if (!items.length) {
        list.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-slate-400">표시할 상품이 없습니다. 직접 추가해 주세요.</td></tr>';
        return;
      }

      items.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50';
        tr.innerHTML = `
          <td class="text-center p-4">
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="updateItemChecked(${index}, this.checked)" class="w-4 h-4 accent-blue-600">
          </td>
          <td class="p-4 font-medium text-slate-800">${escapeHtml(item.name)}</td>
          <td class="p-4 text-center">
            <input type="number" min="1" value="${item.qty}" oninput="updateItemQty(${index}, this.value)" class="w-16 h-10 border border-slate-200 rounded-lg p-1 text-center bg-white">
          </td>
          <td class="p-4 text-right">
            <input type="number" min="0" value="${item.price}" oninput="updateItemPrice(${index}, this.value)" class="w-28 h-10 border border-slate-200 rounded-lg p-1 text-right bg-white font-bold text-blue-600">
          </td>
          <td class="text-center p-4">
            <button onclick="removeItem(${index})" class="action-btn px-3 py-2 rounded-lg bg-red-50 text-red-700 font-bold hover:bg-red-100 transition-all">삭제</button>
          </td>
        `;
        list.appendChild(tr);
      });
    }

    function updateItemChecked(index, isChecked) {
      items[index].checked = isChecked;
      updatePreview();
    }

    function updateItemQty(index, val) {
      items[index].qty = Math.max(1, parseInt(val, 10) || 1);
      updatePreview();
    }

    function updateItemPrice(index, val) {
      items[index].price = Math.max(0, parseInt(val, 10) || 0);
      updatePreview();
    }

    function removeItem(index) {
      items.splice(index, 1);
      renderSelectionTable();
      updatePreview();
      showStatus('상품을 목록에서 삭제했습니다.', 'ok');
    }

    function addItem() {
      const nameInput = document.getElementById('new-item-name');
      const qtyInput = document.getElementById('new-item-qty');
      const priceInput = document.getElementById('new-item-price');

      const name = nameInput.value.trim();
      const qty = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      const price = Math.max(0, parseInt(priceInput.value, 10) || 0);

      if (!name) {
        showStatus('추가할 상품명을 입력해 주세요.', 'warn');
        nameInput.focus();
        return;
      }

      if (price <= 0) {
        showStatus('추가할 상품의 단가를 입력해 주세요.', 'warn');
        priceInput.focus();
        return;
      }

      items.push({ name, qty, price, checked: true });
      nameInput.value = '';
      qtyInput.value = '1';
      priceInput.value = '0';

      renderSelectionTable();
      updatePreview();
      hideStatus();
      showStatus('상품을 직접 추가했습니다.', 'ok');
    }

    function markAll(flag) {
      items.forEach((it) => { it.checked = flag; });
      renderSelectionTable();
      updatePreview();
    }

    function setItems(newItems, sourceText) {
      items = newItems.map((item) => ({
        name: String(item.name || '상품명 없음').trim(),
        price: Number(item.price || 0),
        qty: Math.max(1, Number(item.qty || 1)),
        checked: item.checked !== false
      })).filter((item) => item.name && item.price > 0);

      if (!items.length) {
        renderSelectionTable();
        updatePreview();
        showStatus('가져온 데이터에 유효한 상품이 없습니다. 직접 추가해 주세요.', 'warn');
        return;
      }

      renderSelectionTable();
      updatePreview();
      showStatus(sourceText, 'ok');
      document.getElementById('selection-area').scrollIntoView({ behavior: 'smooth' });
    }

    function updatePreview() {
      const finalList = document.getElementById('final-list');
      finalList.innerHTML = '';
      let totalGross = 0;
      const checkedItems = items.filter((it) => it.checked);

      if (!checkedItems.length) {
        finalList.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-slate-300">선택된 상품이 없습니다.</td></tr>';
      } else {
        checkedItems.forEach((item) => {
          const subtotal = item.price * item.qty;
          totalGross += subtotal;
          const tr = document.createElement('tr');
          tr.innerHTML = `<td class="px-4 py-3 border-black">${escapeHtml(item.name)}</td><td class="text-center border-black">${item.qty}</td><td class="text-right px-4 border-black font-medium">${formatNumber(subtotal)}</td><td class="border-black"></td>`;
          finalList.appendChild(tr);
        });

        const fillCount = Math.max(0, 10 - checkedItems.length);
        for (let i = 0; i < fillCount; i += 1) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td class="py-5 border-black"></td><td class="border-black"></td><td class="border-black"></td><td class="border-black"></td>';
          finalList.appendChild(tr);
        }
      }

      const shipping = Math.max(0, parseInt(document.getElementById('input-shipping').value, 10) || 0);
      const discount = Math.max(0, parseInt(document.getElementById('input-discount').value, 10) || 0);
      const netTotal = Math.max(0, totalGross + shipping - discount);

      document.getElementById('res-gross').innerText = formatNumber(totalGross);
      document.getElementById('res-shipping').innerText = formatNumber(shipping);
      document.getElementById('res-discount').innerText = formatNumber(discount);
      document.getElementById('res-net').innerText = formatNumber(netTotal);
    }

    function showPreview() {
      previewVisible = true;
      const printArea = document.getElementById('print-area');
      printArea.classList.remove('hidden');
      updatePreview();
      printArea.scrollIntoView({ behavior: 'smooth' });
    }

    function isTrustedMessage(event) {
      if (!event || !event.data || typeof event.data.type !== 'string') return false;
      if (!TRUSTED_ORIGINS.has(event.origin)) return false;
      if (event.data.type === 'PING' || event.data.type === 'COUPANG_CART_ITEMS') {
        return event.source === window.opener;
      }
      return false;
    }

    window.addEventListener('message', (event) => {
      if (!isTrustedMessage(event)) return;

      if (event.data.type === 'PING') {
        if (window.opener && event.origin === 'https://www.coupang.com') {
          window.opener.postMessage({ type: 'QUOTE_APP_READY' }, event.origin);
        }
        return;
      }

      if (event.data.type === 'COUPANG_CART_ITEMS') {
        const payload = event.data.payload;
        if (!Array.isArray(payload) || !payload.length) {
          showStatus('전달받은 상품 데이터가 비어 있습니다. 직접 추가해 주세요.', 'warn');
          renderSelectionTable();
          return;
        }
        setItems(payload, '북마클릿에서 체크 상품을 자동으로 불러왔습니다.');
      }
    });

    window.onload = () => {
      document.getElementById('current-date').innerText = new Date().toLocaleDateString('ko-KR');
      renderSelectionTable();
      updatePreview();
      if (window.opener && document.referrer.startsWith('https://www.coupang.com')) {
        try {
          window.opener.postMessage({ type: 'QUOTE_APP_READY' }, 'https://www.coupang.com');
        } catch (e) {}
      }
      if (!previewVisible) {
        document.getElementById('print-area').classList.add('hidden');
      }
      if (!window.opener) {
        showStatus('북마클릿으로 불러오지 않아도 아래에서 상품을 직접 추가할 수 있습니다.', 'warn');
      }
    };
  </script>
</body>
</html>
